<!DOCTYPE html>
<html>
<head>
    <title>Spam Email Classifier</title>
</head>
<body>

    <h2>Spam Email Classifier</h2>

    <form method="POST">
        <textarea name="email" rows="8" cols="50" placeholder="Paste your email here...">{{ email }}</textarea>
        <br><br>
        <button type="submit">Check Email</button>
    </form>

    {% if prediction %}
        <h3>Result: {{ prediction }}</h3>
    {% endif %}

</body>
</html>
